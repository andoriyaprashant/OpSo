name: opso
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.3 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  flutter:
    sdk: flutter
  font_awesome_flutter: ^10.10.0
  html: ^0.15.6
  http: ^1.5.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  google_generative_ai: ^0.4.7
  dio: ^5.9.0
  animated_text_kit: ^4.2.3
  adaptive_theme: ^3.7.1+2
  timeline_tile: ^2.0.0
  flutter_svg: ^2.2.1
  flutter_screenutil: ^5.9.1
  multi_select_flutter: ^4.1.3
  jovial_svg: ^1.1.27
  flutter_dotenv: ^5.0.2
  awesome_notifications: ^0.10.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path: "assets/OpSo_main.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/splash_main.png
    - assets/OpSo_about.png
    - assets/github_swag.png
    - assets/fossasia.png
    - assets/sokde.png
    - assets/redox.png
    - assets/djangonaut.png
    - assets/hacktoberfest.png
    - assets/hyperledger.png
    - assets/xyz_domain.png
    - assets/participation_certificate.png
    - assets/coding_ninja_swag.png
    - assets/git_campus_logo.png
    - assets/no-results.png

